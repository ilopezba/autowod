name: Daily Reservation
run-name: "🏋️ AutoWOD – ${{ github.event_name == 'workflow_dispatch' && 'Manual run' || 'Daily schedule' }}"

on:
  schedule:
    # Runs twice to cover both Spain summer (CEST, UTC+2) and winter (CET, UTC+1) time.
    # Land around 2:05 AM local time for 2:10 AM booking opening.
    - cron: '20 0 * * *'
    - cron: '20 1 * * *'

  # Run it manually from the Actions tab whenever you need to.
  # Useful when your gym opens the whole week at once — trigger once and
  # set "Days to book ahead" to the number of days you want to cover.
  workflow_dispatch:
    inputs:
      available_days:
        description: 'Days to book ahead (leave empty to use the AVAILABLE_DAYS variable)'
        required: false
        default: ''

# Prevent two runs from overlapping and trying to book the same sessions.
concurrency:
  group: reservation
  cancel-in-progress: false

jobs:
  book-session:
    name: Book Workout Session
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get latest code
        uses: actions/checkout@v6

      - name: 🗓️ Decide whether to run today
        id: schedule-gate
        env:
          BOOKING_FREQUENCY: ${{ vars.BOOKING_FREQUENCY || 'daily' }}
          BOOKING_WEEKDAY: ${{ vars.BOOKING_WEEKDAY || 'sunday' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          frequency="$(echo "${BOOKING_FREQUENCY:-daily}" | tr '[:upper:]' '[:lower:]' | xargs)"
          target_day="$(echo "${BOOKING_WEEKDAY:-sunday}" | tr '[:upper:]' '[:lower:]' | xargs)"
          today="$(TZ=Europe/Madrid date +%A | tr '[:upper:]' '[:lower:]')"

          case "$target_day" in
            monday|tuesday|wednesday|thursday|friday|saturday|sunday) ;;
            *)
              echo "Unknown BOOKING_WEEKDAY '$BOOKING_WEEKDAY'; defaulting to daily."
              echo "Unknown BOOKING_WEEKDAY '$BOOKING_WEEKDAY'; defaulted to daily for this run." >> "$GITHUB_STEP_SUMMARY"
              frequency="daily"
              ;;
          esac

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run requested — booking script will run." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$frequency" = "weekly" ] && [ "$today" != "$target_day" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Weekly mode is enabled for $target_day. Today is $today in Europe/Madrid, so AutoWOD skipped this scheduled run." >> "$GITHUB_STEP_SUMMARY"
          else
            if [ "$frequency" != "daily" ] && [ "$frequency" != "weekly" ]; then
              echo "Unknown BOOKING_FREQUENCY '$BOOKING_FREQUENCY'; defaulting to daily."
              echo "Unknown BOOKING_FREQUENCY '$BOOKING_FREQUENCY'; defaulted to daily for this run." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "AutoWOD will run today ($today, Europe/Madrid)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📦 Install pnpm
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - name: 🔧 Set up Node.js
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 💾 Cache pnpm store
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: 📚 Install dependencies
        if: steps.schedule-gate.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: 💾 Cache Puppeteer browser
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            puppeteer-cache-${{ runner.os }}-

      - name: 🌐 Install Chrome for Puppeteer
        if: steps.schedule-gate.outputs.should_run == 'true'
        run: pnpm exec puppeteer browsers install chrome

      - name: 📋 Restore booking state
        if: steps.schedule-gate.outputs.should_run == 'true'
        id: booking-state-restore
        uses: actions/cache/restore@v5
        with:
          path: booking-state.json
          key: booking-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            booking-state-${{ runner.os }}-

      - name: 🎯 Run booking script
        if: steps.schedule-gate.outputs.should_run == 'true'
        env:
          TZ: 'Europe/Madrid'
          LANG: 'es_ES.UTF-8'
          LC_ALL: 'es_ES.UTF-8'
          # Secrets (coincidiendo exactamente con los que creamos)
          URL: ${{ secrets.WODBUSTER_URL }}
          EMAIL: ${{ secrets.WODBUSTER_EMAIL }}
          PASSWORD: ${{ secrets.WODBUSTER_PASSWORD }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}

          # Variables (las configurarás en la pestaña Variables si lo necesitas)
          MONDAY: ${{ vars.MONDAY }}
          TUESDAY: ${{ vars.TUESDAY }}
          WEDNESDAY: ${{ vars.WEDNESDAY }}
          THURSDAY: ${{ vars.THURSDAY }}
          FRIDAY: ${{ vars.FRIDAY }}
          SATURDAY: ${{ vars.SATURDAY }}
          SUNDAY: ${{ vars.SUNDAY }}
          AVAILABLE_DAYS: ${{ inputs.available_days || vars.AVAILABLE_DAYS }}
        run: pnpm start

      - name: 💾 Save booking state
        if: ${{ always() && steps.schedule-gate.outputs.should_run == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: booking-state.json
          key: booking-state-${{ runner.os }}-${{ github.run_id }}
          
